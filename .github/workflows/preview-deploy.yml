name: Preview Deploy

# Handles preview deployments for pull requests with smart server URL routing:
#   - PR with server changes  → deploy server preview first, client preview points to it
#   - PR with client changes only → client preview points to the production server
#
# Requires GitHub secrets:
#   VERCEL_TOKEN            - Vercel personal access token
#   VERCEL_ORG_ID           - Vercel team/org ID (from .vercel/project.json or dashboard)
#   VERCEL_CLIENT_PROJECT_ID - Vercel project ID for the client project
#   VERCEL_SERVER_PROJECT_ID - Vercel project ID for the server project
#
# Vercel project settings (set in each project's dashboard):
#   Ignored Build Step: [ "$VERCEL_ENV" != "production" ]
#   This skips automatic Vercel preview builds so this workflow has full control.
#   Production pushes to main still deploy automatically.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  issues: write

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 1. Detect which parts of the repo changed ──────────────────────────
      - name: Detect changed paths
        id: changes
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$BASE" "$HEAD" | grep -q '^server/'; then
            echo "server=true" >> "$GITHUB_OUTPUT"
          else
            echo "server=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # ── 2. Clean up stale comment + post pending ───────────────────────────
      - name: Post pending comment
        id: pending-comment
        uses: actions/github-script@v7
        with:
          script: |
            const serverChanged = '${{ steps.changes.outputs.server }}' === 'true';
            const logsUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const branch = '${{ github.head_ref }}';
            const marker = '<!-- preview-deploy -->';

            // Delete any stale comment from a previously canceled run
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            for (const c of comments.data) {
              if (c.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  comment_id: c.id,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                });
              }
            }

            const body = [
              marker,
              '## Deploying Preview ⏳',
              '',
              '| Project | Status |',
              '|---------|--------|',
              '| 🖥️ **Client** | Deploying... |',
              `| ⚙️ **Server** | ${serverChanged ? 'Deploying...' : 'Using production'} |`,
              '',
              `> Branch: \`${branch}\` · [View logs](${logsUrl})`,
            ].join('\n');

            const comment = await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
            core.setOutput('comment-id', comment.data.id);

      # ── 3. Deploy server preview (only when server files changed) ──────────
      - name: Deploy server preview
        id: server-deploy
        if: steps.changes.outputs.server == 'true'
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SERVER_PROJECT_ID }}
        run: |
          SERVER_URL=$(vercel deploy --token="${{ secrets.VERCEL_TOKEN }}" --yes | tail -1)
          echo "url=$SERVER_URL" >> "$GITHUB_OUTPUT"

      # ── 3. Resolve the API URL the client preview should use ───────────────
      - name: Resolve API URL
        id: api-url
        run: |
          if [ "${{ steps.changes.outputs.server }}" = "true" ] && [ -n "${{ steps.server-deploy.outputs.url }}" ]; then
            echo "url=${{ steps.server-deploy.outputs.url }}" >> "$GITHUB_OUTPUT"
            echo "note=Preview" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://ctc-vercel-testing-deploy-server.vercel.app" >> "$GITHUB_OUTPUT"
            echo "note=Production (no server changes in this PR)" >> "$GITHUB_OUTPUT"
          fi

      # ── 4. Build client locally then deploy the pre-built output ─────────
      # Building locally gives us full control over VITE_API_URL without
      # relying on vercel deploy --build-env (which doesn't reliably expose
      # the value to the buildCommand shell script).
      - name: Install dependencies
        run: yarn install

      - name: Build client
        run: VITE_API_URL="${{ steps.api-url.outputs.url }}" yarn workspace client build

      - name: Package client for Vercel
        run: |
          mkdir -p .vercel/output/static
          cp -r client/dist/* .vercel/output/static/
          # SPA routing: serve index.html for all paths
          cat > .vercel/output/config.json << 'EOF'
          {"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}
          EOF

      - name: Deploy client preview
        id: client-deploy
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_CLIENT_PROJECT_ID }}
        run: |
          CLIENT_URL=$(vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}" --yes | tail -1)
          echo "url=$CLIENT_URL" >> "$GITHUB_OUTPUT"

      # ── 5. Update comment with final preview URLs ──────────────────────────
      - name: Update comment with preview URLs
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const succeeded = '${{ job.status }}' === 'success';
            const serverChanged = '${{ steps.changes.outputs.server }}' === 'true';
            const clientUrl = '${{ steps.client-deploy.outputs.url }}';
            const serverUrl = serverChanged
              ? '${{ steps.server-deploy.outputs.url }}'
              : 'https://ctc-vercel-testing-deploy-server.vercel.app';
            const logsUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const branch = '${{ github.head_ref }}';

            if (!succeeded) {
              await github.rest.issues.deleteComment({
                comment_id: ${{ steps.pending-comment.outputs.comment-id }},
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              return;
            }

            const body = [
              '<!-- preview-deploy -->',
              '## Preview Ready ✅',
              '',
              '| Project | URL | Status |',
              '|---------|-----|--------|',
              `| 🖥️ **Client** | [Visit Preview](${clientUrl}) | ✅ Ready |`,
              `| ⚙️ **Server** | [Visit Preview](${serverUrl}) | ${serverChanged ? '✅ Ready' : '⚡ Production'} |`,
              '',
              `> Branch: \`${branch}\` · [View logs](${logsUrl})`,
            ].join('\n');

            await github.rest.issues.updateComment({
              comment_id: ${{ steps.pending-comment.outputs.comment-id }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
